[pytest]
testpaths = llm_prompt_firewall/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    integration: marks tests that require external model downloads or API calls (deselect with -m "not integration")

# Show short tracebacks for cleaner CI output. Switch to "long" locally.
addopts = --tb=short
